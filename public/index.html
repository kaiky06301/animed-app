<!DOCTYPE html>
<html lang="pt-BR" translate="no">
  <head>
    <meta charset="utf-8" />
    <meta httpEquiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no, viewport-fit=cover" />
    <meta name="google" content="notranslate" />
    <meta name="theme-color" content="#0F1419" />
    <title>Animed</title>
    <style id="expo-reset">
      html,
      body {
        height: 100%;
        margin: 0;
        padding: 0;
        background: #0F1419;
        -webkit-tap-highlight-color: transparent;
        overscroll-behavior: none;
      }
      body {
        overflow: hidden;
      }
      #root {
        display: flex;
        height: 100%;
        flex: 1;
      }

      /* Em telas grandes (desktop/tablet) emula um celular centralizado */
      @media (min-width: 600px) {
        body {
          display: flex;
          align-items: stretch;
          justify-content: center;
          background:
            radial-gradient(1200px 600px at 50% -10%, rgba(34,211,160,0.10), transparent 60%),
            radial-gradient(900px 500px at 110% 110%, rgba(255,138,61,0.08), transparent 60%),
            #0a0e13;
        }
        #root {
          max-width: 480px;
          width: 100%;
          height: 100vh;
          box-shadow: 0 30px 80px rgba(0, 0, 0, 0.6), 0 0 0 1px rgba(255,255,255,0.04);
          border-radius: 0;
        }
      }
    </style>
  </head>
  <body>
    <noscript>Você precisa habilitar JavaScript para executar este app.</noscript>
    <div id="root"></div>
  </body>
</html>
